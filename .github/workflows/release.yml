name: DupZero — Create Release
# Creates GitHub Release with APK download
# Usage: git tag v1.1.0 && git push --tags

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable

      - name: Apply Firebase config
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: DupZero ${{ github.ref_name }}
          body: |
            ## DupZero ${{ github.ref_name }}
            **Developed by Tavoo**

            ### Install
            1. Download APK below
            2. Enable "Install from unknown sources" on Android
            3. Install and enjoy!

            ### Features
            - Duplicate file detection
            - AI similar image detection
            - Storage alert at 70%
            - Recycle Bin (30 days)
            - Works 100% offline
            - Pro: $2.99/month

            ### Developer
            Tavoo — Mzumbe University, Tanzania
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
